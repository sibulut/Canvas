<style>
/* ── Animal Cell Diagram · Canvas-safe · scoped to #cw ── */
#cw,#cw *,#cw *::before,#cw *::after{box-sizing:border-box;margin:0;padding:0}
#cw{
  font-family:Georgia,serif;background:#080c14;color:#e2e8f0;
  border-radius:14px;padding:1.8rem 1.4rem 2.2rem;user-select:none;
}
#cw-hd{text-align:center;margin-bottom:1.4rem}
#cw-hd h2{font-family:Georgia,serif;font-size:clamp(1.1rem,3vw,1.55rem);font-weight:700;color:#fff;letter-spacing:.02em}
#cw-hd p{font-family:Verdana,sans-serif;font-size:.74rem;color:#475569;margin-top:.3rem;letter-spacing:.06em}
#cw-main{display:flex;flex-wrap:wrap;gap:1.1rem;align-items:flex-start}
#cw-svg-wrap{flex:1 1 300px;min-width:260px}
#cw-svg{width:100%;height:auto;display:block}
/* organelle click/hover */
.cw-org{cursor:pointer}
.cw-org:hover .cw-gl{opacity:.55!important;transition:opacity .2s}
.cw-org.active .cw-gl{opacity:.85!important;filter:url(#f-hi)!important}
.cw-org.active .cw-bdr{stroke-width:3.5!important;opacity:1!important}
/* panel */
#cw-panel{
  flex:1 1 230px;min-width:210px;max-width:310px;
  background:#0d1421;border:1px solid #1e2a3a;border-radius:10px;
  padding:1.3rem;display:flex;flex-direction:column;gap:.8rem;
}
/* legend */
#cw-leg .cw-leg-hd{font-family:Verdana,sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#334155;margin-bottom:.5rem}
.cw-li{
  display:flex;align-items:center;gap:.55rem;padding:.38rem .5rem;
  border-radius:6px;border:1px solid transparent;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.cw-li:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07)}
.cw-li.active{background:rgba(255,255,255,.06);border-color:var(--lc,#fff)}
.cw-li .cw-dot{width:9px;height:9px;border-radius:50%;background:var(--lc);flex-shrink:0}
.cw-li .cw-nm{font-family:Verdana,sans-serif;font-size:.78rem;color:#94a3b8}
/* detail */
#cw-det{display:none;flex-direction:column;gap:.7rem;animation:cw-up .32s ease}
#cw-det.show{display:flex}
@keyframes cw-up{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.cw-det-name{font-family:Georgia,serif;font-size:1.25rem;font-weight:700;color:#fff;line-height:1.2}
.cw-det-role{font-family:Verdana,sans-serif;font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dc)}
.cw-det-bar{height:2px;width:38%;background:var(--dc);border-radius:99px;margin:.05rem 0}
.cw-det-desc{font-family:Verdana,sans-serif;font-size:.79rem;line-height:1.62;color:#94a3b8}
.cw-det-facts{display:flex;flex-direction:column;gap:.38rem}
.cw-det-fact{font-family:Verdana,sans-serif;font-size:.75rem;color:#cbd5e1;padding:.38rem .6rem;background:rgba(255,255,255,.035);border-left:2px solid var(--dc);border-radius:0 4px 4px 0;line-height:1.5}
.cw-det-know{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:.6rem .75rem;font-family:Verdana,sans-serif;font-size:.73rem;color:#94a3b8;line-height:1.55}
.cw-det-know strong{color:var(--dc)}
.cw-back{margin-top:auto;background:none;border:1px solid #1e2a3a;border-radius:5px;color:#475569;font-family:Verdana,sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .8rem;cursor:pointer;align-self:flex-start;transition:border-color .15s,color .15s}
.cw-back:hover{border-color:#475569;color:#94a3b8}
@media(max-width:560px){#cw-main{flex-direction:column}#cw-panel{max-width:100%}}
</style>

        <div class="cw-det-name" id="cw-dname"></div>
        <div class="cw-det-role" id="cw-drole"></div>
        <div class="cw-det-bar"  id="cw-dbar"></div>
        <div class="cw-det-desc" id="cw-ddesc"></div>
        <div class="cw-det-facts" id="cw-dfacts"></div>
        <div class="cw-det-know" id="cw-dknow"></div>
        <button class="cw-back" onclick="cwBack()">&#8592; All Organelles</button>
      </div>
    </div>

  </div>
</div>

<script>
(function(){

var D={
  'membrane':{
    name:'Cell Membrane',color:'#22d3ee',role:'Barrier & Gatekeeper',
    desc:'A selectively permeable phospholipid bilayer forming the outer boundary of every animal cell, controlling what enters and exits.',
    facts:[
      'Made of two phospholipid layers with hydrophilic heads facing outward and hydrophobic tails facing inward',
      'Membrane proteins act as channels, pumps, receptors and structural anchors — described by the fluid mosaic model',
      'Just 7–10 nanometres thick — roughly 5,000 times thinner than a human hair'
    ],
    know:'A single cell membrane contains over <strong>1 billion</strong> phospholipid molecules and can repair small tears within seconds.'
  },
  'nucleus':{
    name:'Nucleus',color:'#818cf8',role:'Command Centre',
    desc:'The largest organelle in most animal cells; houses the DNA and directs all cellular activities including growth, metabolism and division.',
    facts:[
      'Enclosed by the nuclear envelope — a double membrane with nuclear pores that regulate molecule traffic',
      'Contains chromosomes: DNA wound tightly around histone proteins to form chromatin',
      'The nucleoplasm (fluid inside) is kept separate from the cytoplasm'
    ],
    know:'The human cell nucleus contains about <strong>6 feet (1.8 m)</strong> of DNA, coiled to fit inside a space just 6 micrometres across.'
  },
  'nucleolus':{
    name:'Nucleolus',color:'#a78bfa',role:'Ribosome Factory',
    desc:'A dense region inside the nucleus where ribosomal RNA (rRNA) is transcribed and ribosome subunits are assembled before export to the cytoplasm.',
    facts:[
      'Not enclosed by its own membrane — forms around specific chromosomal regions called nucleolar organiser regions',
      'Disappears during cell division and reforms in each daughter cell afterwards',
      'Cells with high protein demand (like liver cells) often have large, prominent nucleoli'
    ],
    know:'A single human cell can produce up to <strong>10,000 ribosome subunits per minute</strong> in the nucleolus during rapid growth.'
  },
  'mitochondria':{
    name:'Mitochondria',color:'#f97316',role:'Powerhouse of the Cell',
    desc:'Double-membraned organelles that generate ATP (the cell\'s energy currency) through cellular respiration, using oxygen and glucose.',
    facts:[
      'The inner membrane is folded into cristae, dramatically increasing surface area for ATP synthase complexes',
      'Contain their own circular DNA and ribosomes — evidence of endosymbiotic origin from ancient bacteria',
      'A typical liver cell contains over 2,000 mitochondria, occupying ~25% of the cell volume'
    ],
    know:'Mitochondria are inherited almost exclusively from your <strong>mother</strong> — scientists use mitochondrial DNA to trace maternal lineage back thousands of years.'
  },
  'rough-er':{
    name:'Rough Endoplasmic Reticulum',color:'#10b981',role:'Protein Production Line',
    desc:'A network of membrane sacs (cisternae) studded with ribosomes, specialised in making proteins destined for secretion or membrane insertion.',
    facts:[
      '"Rough" refers to the ribosomes on its surface that translate mRNA into polypeptide chains',
      'Newly made proteins enter the ER lumen where they are folded, modified and quality-checked',
      'Continuous with the nuclear envelope — proteins can travel directly from nucleus to ER'
    ],
    know:'The rough ER in a pancreatic cell can produce and process up to <strong>1 million insulin molecules</strong> per minute.'
  },
  'smooth-er':{
    name:'Smooth Endoplasmic Reticulum',color:'#2dd4bf',role:'Lipid Synthesis & Detox',
    desc:'A smooth-surfaced membrane network (no ribosomes) responsible for lipid and steroid synthesis, calcium storage, and detoxification.',
    facts:[
      'Especially abundant in liver cells, where it breaks down alcohol, drugs and metabolic waste products',
      'Stores calcium ions in muscle cells — releasing Ca²⁺ triggers muscle contraction',
      'Synthesises phospholipids for all cell membranes and steroid hormones like testosterone and oestrogen'
    ],
    know:'Regular alcohol consumption causes liver cells to <strong>triple the amount</strong> of smooth ER — the cell adapts to cope with increased detoxification demand.'
  },
  'golgi':{
    name:'Golgi Apparatus',color:'#e879f9',role:'Sorting & Shipping Hub',
    desc:'A stack of flattened membrane cisternae that receives proteins from the rough ER, modifies them, and dispatches them to correct destinations inside or outside the cell.',
    facts:[
      'Has a cis face (receiving, near ER) and a trans face (shipping) — proteins flow from cis to trans',
      'Modifies proteins by adding sugar chains, phosphates or lipids that act as address labels for sorting',
      'Produces lysosomes and secretory vesicles by budding from the trans face'
    ],
    know:'The Golgi was discovered in 1898 by Camillo Golgi — and was so unusual that many scientists initially dismissed it as an <strong>artefact of staining</strong>, not a real structure.'
  },
  'lysosome':{
    name:'Lysosome',color:'#f43f5e',role:'Recycling Centre',
    desc:'Small membrane-bound vesicles containing over 50 types of hydrolytic enzymes, used to break down waste materials, old organelles, and invading pathogens.',
    facts:[
      'The interior is highly acidic (pH ~4.5–5) — this activates the enzymes and protects the rest of the cell if the membrane leaks',
      'Carry out autophagy — breaking down damaged organelles to salvage reusable molecules',
      'Fuse with phagosomes to digest engulfed bacteria — a key part of innate immunity'
    ],
    know:'When a tadpole transforms into a frog, lysosomes deliberately <strong>burst to dissolve the tail from within</strong> — a process called autolysis.'
  },
  'vacuole':{
    name:'Vacuole',color:'#38bdf8',role:'Storage Chamber',
    desc:'A membrane-bound organelle used to store water, nutrients and waste. Animal cell vacuoles are small and temporary compared to the massive central vacuole found in plant cells.',
    facts:[
      'In animal cells, vacuoles are typically small, forming temporarily via endocytosis or exocytosis',
      'Food vacuoles (phagosomes) form when cells engulf solid particles or whole bacteria',
      'Contractile vacuoles in single-celled organisms like Paramecium pump out excess water to maintain osmotic balance'
    ],
    know:'Plant cell central vacuoles can occupy <strong>up to 90%</strong> of the cell\'s volume — the plant cell is essentially a bag of water wrapped in a thin cytoplasm shell.'
  },
  'ribosomes':{
    name:'Ribosomes',color:'#fbbf24',role:'Protein Synthesisers',
    desc:'The cell\'s protein-making machines — complexes of ribosomal RNA and proteins that decode mRNA and assemble amino acids into polypeptide chains.',
    facts:[
      'Composed of a large and small subunit that come together on mRNA to begin translation',
      'Free ribosomes make proteins for use inside the cell; ER-bound ribosomes make proteins for secretion or membranes',
      'Each ribosome adds roughly 10–20 amino acids per second to a growing polypeptide chain'
    ],
    know:'A single human cell contains up to <strong>10 million ribosomes</strong> — more than any other organelle type in the entire cell.'
  }
};

var ITEMS=[
  {id:'membrane',    label:'Cell Membrane'},
  {id:'nucleus',     label:'Nucleus'},
  {id:'nucleolus',   label:'Nucleolus'},
  {id:'mitochondria',label:'Mitochondria'},
  {id:'rough-er',    label:'Rough ER'},
  {id:'smooth-er',   label:'Smooth ER'},
  {id:'golgi',       label:'Golgi Apparatus'},
  {id:'lysosome',    label:'Lysosome'},
  {id:'vacuole',     label:'Vacuole'},
  {id:'ribosomes',   label:'Ribosomes'}
];

// Build legend
var leg=document.getElementById('cw-leg');
ITEMS.forEach(function(item){
  var c=D[item.id].color;
  var div=document.createElement('div');
  div.className='cw-li';div.setAttribute('data-id',item.id);
  div.style.setProperty('--lc',c);
  div.innerHTML='<span class="cw-dot"></span><span class="cw-nm">'+item.label+'</span>';
  div.onclick=function(){cwSel(item.id);};
  leg.appendChild(div);
});

window.cwSel=function(id){
  if(!D[id])return;
  var d=D[id];

  // SVG highlight
  document.querySelectorAll('#cw .cw-org').forEach(function(g){
    g.classList.toggle('active',g.getAttribute('data-id')===id);
  });
  // legend highlight
  document.querySelectorAll('#cw .cw-li').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('data-id')===id);
  });

  // fill detail panel
  var det=document.getElementById('cw-det');
  det.style.setProperty('--dc',d.color);
  document.getElementById('cw-dname').textContent=d.name;
  var roleEl=document.getElementById('cw-drole');
  roleEl.textContent=d.role;roleEl.style.color=d.color;
  document.getElementById('cw-dbar').style.background=d.color;
  document.getElementById('cw-ddesc').textContent=d.desc;

  var factsEl=document.getElementById('cw-dfacts');
  factsEl.innerHTML='';
  d.facts.forEach(function(f){
    var div=document.createElement('div');div.className='cw-det-fact';
    div.style.setProperty('--dc',d.color);div.textContent=f;
    factsEl.appendChild(div);
  });

  var knowEl=document.getElementById('cw-dknow');
  knowEl.innerHTML='<strong style="color:'+d.color+'">Did you know?</strong> '+d.know;

  // toggle panels
  document.getElementById('cw-leg').style.display='none';
  det.classList.remove('show');
  void det.offsetWidth;
  det.classList.add('show');
};

window.cwBack=function(){
  document.querySelectorAll('#cw .cw-org').forEach(function(g){g.classList.remove('active');});
  document.querySelectorAll('#cw .cw-li').forEach(function(el){el.classList.remove('active');});
  document.getElementById('cw-leg').style.display='';
  document.getElementById('cw-det').classList.remove('show');
};

})();
</script>
